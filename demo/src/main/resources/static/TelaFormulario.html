<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário Agendamento</title>
    <link rel="stylesheet" href="TelaFormulario.css">
</head>

<body>

    <header>
        <div class="logo-sp">
            <img src="imagens/São_Paulo_Government_Logo.svg.png" alt="Governo de São Paulo">
        </div>

        <h1>Agendamento da Sala Informática</h1>
    </header>

    <div class="main-container">
        <div class="form-card">
            <form action="#">
                <div class="form-grid">

                    <div class="input-box">
                        <label>Nome completo</label>
                        <!-- Adicionado id="nomeCompleto" -->
                        <input type="text" id="nomeCompleto">
                    </div>

                    <div class="input-box">
                        <label>Data e Hora</label>
                        <!-- Adicionado id="dataHora" -->
                        <input type="datetime-local" id="dataHora">
                    </div>

                    <div class="input-box">
                        <label>Número de Alunos</label>
                        <!-- Adicionado id="numeroAlunos" -->
                        <input type="number" id="numeroAlunos">
                    </div>

                    <div class="input-box">
                        <label>Finalidade de Uso</label>
                        <!-- Adicionado id="finalidadeUso" -->
                        <input type="text" id="finalidadeUso">
                    </div>

                    <div class="input-box">
                        <label>Equipamentos</label>
                        <!-- Adicionado id="equipamentos" -->
                        <input type="text" id="equipamentos">
                    </div>

                    <div class="input-box">
                        <label>Turma</label>
                        <!-- Adicionado id="turma" -->
                        <select id="turma">
                            <option value="">Selecione...</option>
                            <option value="6º Ano A">6º Ano A</option>
                            <option value="7º Ano A">7º Ano A</option>
                            <option value="1º EM">1º EM</option>
                        </select>
                    </div>

                    <div class="btn-container">
                        <button type="submit" class="btn-enviar">Agendar</button>
                    </div>
                    <a href="index.html">
                        <button class="btn-voltar">Voltar</button>
                    </a>
                </div>
            </form>
        </div>
    </div>

    <script src="TelaFormulario.js"></script>
</body>

</html>
