<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <title>Gestão de Professores</title>
  <link rel="stylesheet" href="TelaGerenciamento.css">
</head>

<body>

  <!-- TOPO -->
  <div class="topo">
    <div class="azul">
      <img src="46a55ed3e06317553ee3d53acfed8ce6.png" alt="logo">
    </div>

    <div class="titulo">
      <h2>Educare</h2>
      <p>Sistema educacional de computadores</p>
    </div>
  </div>

  <!-- CONTAINER -->
  <div class="container">

    <div class="box">

      <!-- HEADER -->
      <div class="header">
        <div class="gov">

        </div>

        <div class="filtros">
          Página:
          <select>
            <option>1</option>
          </select>

          <input type="text" placeholder="Buscar">
          <button>🔍</button>
        </div>
      </div>

      <button class="add">+ adicionar Professor</button>

      <!-- TABELA -->
      <div class="tabela">
        <table>
          <thead>
            <tr>
              <th>Professores</th>
              <th>Status</th>
              <th></th>
            </tr>
          </thead>

          <tbody>
            <tr>
              <td></td>
              <td></td>
              <td class="acoes">✏️ 🗑️</td>
            </tr>

            <tr>
              <td></td>
              <td><span class="ok">Agendado</span></td>
              <td class="acoes">✏️ 🗑️</td>
            </tr>

            <tr>
              <td></td>
              <td><span class="no">Cancelado</span></td>
              <td class="acoes">✏️ 🗑️</td>
            </tr>

            <tr>
              <td></td>
              <td></td>
              <td class="acoes">✏️ 🗑️</td>
            </tr>

            <tr>
              <td></td>
              <td></td>
              <td class="acoes">✏️ 🗑️</td>
            </tr>
          </tbody>
        </table>
      </div>

    </div>

    <div class="rodape">
      <button class="update">Atualizar</button>
      <a href="TelaPrincipalAdm.html">
        <button class="btn-voltar">Voltar</button>
      </a>
    </div>

  </div>

</body>

</html>
