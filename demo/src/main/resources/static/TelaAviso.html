<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Comunicados - Escola Estadual</title>
  <link rel="stylesheet" href="TelaAviso.css" />
</head>

<body>

  <header>
    <div class="header-inner">
      <div class="logo-wrap">
        <img src="imagens/IMG-20260422-WA0002(1).png" alt="Logo Escola" class="logo" />
      </div>
      <h1 class="titulo">Comunicados</h1>
      <button class="menu-btn" aria-label="Menu">
    </div>
    <div class="header-wave"></div>
  </header>

  <main>
    <div class="cards-grid" id="grid-avisos">
      <!-- Os avisos do banco vão aparecer aqui -->
    </div>

    <!-- Botão Voltar (mantenha fora da grid para não sumir) -->
    <div class="center-col">
      <a href="index.html" class="btn-voltar">Voltar</a>
    </div>

    <div class="footer-logo">
      <img src="imagens/São_Paulo_Government_Logo.svg.png" alt="Governo do Estado de São Paulo" />
    </div>
  </main>

  <script>
    async function carregarAvisos() {
      const response = await fetch('http://localhost:8080/api/avisos');
      const avisos = await response.json();
      const grid = document.getElementById('grid-avisos');

      grid.innerHTML = avisos.map(aviso => `
            <div class="card">
                <div class="card-img-wrap">
                    <img src="${aviso.imagemUrl}" alt="${aviso.titulo}" />
                </div>
                <div class="card-body">
                    <p><strong>${aviso.titulo}:</strong></p>
                    <p>${aviso.conteudo}</p>
                </div>
            </div>
        `).join('');
    }

    // Carrega os avisos assim que a página abre
    window.onload = carregarAvisos;
  </script>
</body>

</html>
