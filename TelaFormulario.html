<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário Agendamento</title>
    <link rel="stylesheet" href="TelaFormulario.css">
</head>

<body>

    <header>
        <div class="logo-sp">
            <img src="/São_Paulo_Government_Logo.svg.png" alt="Governo de São Paulo">
        </div>

        <h1>Agendamento da Sala Informática</h1>

        <div class="menu-icon" onclick="toggleMenu()">☰</div>
    </header>

    <!-- MENU LATERAL -->
    <div id="menuLateral" class="menu-lateral">
        <a href="TelaFormulario.html">Nova reserva</a>
        <a href="TelaCalendario.html">Visualizar datas</a>
        <a href="TelaSobre.html">Sobre a Sala</a>
        <a href="TelaAvisos.html">Avisos</a>
    </div>

    <div class="main-container">
        <div class="form-card">
            <form action="#">
                <div class="form-grid">

                    <div class="input-box">
                        <label>Nome completo</label>
                        <input type="text">
                    </div>

                    <div class="input-box">
                        <label>Data e Hora</label>
                        <input type="datetime-local">
                    </div>

                    <div class="input-box">
                        <label>Número de Alunos</label>
                        <input type="number">
                    </div>

                    <div class="input-box">
                        <label>Finalidade de Uso</label>
                        <input type="text">
                    </div>

                    <div class="input-box">
                        <label>Equipamentos</label>
                        <input type="text">
                    </div>

                    <div class="input-box">
                        <label>Turma</label>
                        <select>
                            <option>Selecione...</option>
                            <option>6º Ano A</option>
                            <option>7º Ano A</option>
                            <option>1º EM</option>
                        </select>
                    </div>

                    <div class="btn-container">
                        <button class="btn-enviar">Agendar</button>
                    </div>

                </div>
            </form>
        </div>
    </div>

    <script src="TelaFormulario.js"></script>
</body>

</html>
