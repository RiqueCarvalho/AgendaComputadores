<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Comunicados - Escola Estadual</title>
  <link rel="stylesheet" href="TelaAviso.css" />
</head>
<body>

  <header>
    <div class="header-inner">
      <div class="logo-wrap">
        <img src="imagens/IMG-20260422-WA0002(1).png" alt="Logo Escola" class="logo" />
      </div>
      <h1 class="titulo">Comunicados</h1>
      <button class="menu-btn" aria-label="Menu">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>
    <div class="header-wave"></div>
  </header>

  <main>
    <div class="cards-grid">

      <!-- Card Sala em Manutenção -->
      <div class="card">
        <div class="card-img-wrap">
          <img src="https://images.unsplash.com/photo-1580582932707-520aed937b7b?w=400&q=80" alt="Sala de Informática" />
        </div>
        <div class="card-body">
          <p><strong>Sala em Manutenção:</strong></p>
          <p>Previsão Término: 12/06/2026</p>
          <p>Motivo: Troca de Monitores</p>
        </div>
      </div>

      <!-- Botão Voltar centralizado -->
      <div class="center-col">
        <button class="btn-voltar">Voltar</button>
      </div>

      <!-- Card Reuniões -->
      <div class="card">
        <div class="card-img-wrap">
          <img src="https://images.unsplash.com/photo-1524178232363-1fb2b075b655?w=400&q=80" alt="Reunião" />
        </div>
        <div class="card-body">
          <p><strong>Reuniões:</strong></p>
          <p>Motivo: Alinhamento</p>
          <p>Data: Toda Quarta-Feira</p>
        </div>
      </div>

    </div>

    <div class="footer-logo">
      <img src="imagens/São_Paulo_Government_Logo.svg.png" alt="Governo do Estado de São Paulo" />
    </div>
  </main>

</body>
</html>
